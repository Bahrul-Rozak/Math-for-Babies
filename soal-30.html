<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈 Soal 30 - Kuis Matematika TK (Terakhir!) 🎈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #b8e1fc 0%, #9ac9f0 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            max-width: 750px;
            width: 100%;
            background: #fffef7;
            border-radius: 68px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: 4px solid #ffcd7e;
            animation: bounceIn 0.4s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .quiz-header {
            background: linear-gradient(135deg, #ff8c42, #ff6b35);
            padding: 20px 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .badge-soal {
            background: #ffdd99;
            color: #c13b00;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .score-badge {
            background: #2e7d32;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .question-area {
            padding: 35px 25px 20px;
            text-align: center;
        }

        .question-text {
            font-size: 2rem;
            background: #fef3c7;
            padding: 25px 15px;
            border-radius: 50px;
            margin-bottom: 25px;
            border: 3px solid #ffb347;
            box-shadow: 0 8px 0 #e0a800;
        }

        .options-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 0 25px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #f0f0f0;
            border: 3px solid #ffb347;
            border-radius: 60px;
            padding: 16px 20px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.08s linear;
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
        }

        .option-btn:active {
            transform: scale(0.97);
        }

        .option-prefix {
            background: #ffb347;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .feedback-area {
            background: #fff1d6;
            margin: 0 25px 20px;
            border-radius: 48px;
            padding: 15px 20px;
            min-height: 85px;
            font-size: 1.2rem;
            border-left: 12px solid #ff914d;
        }

        .next-area {
            padding: 0 25px 35px;
            display: flex;
            justify-content: center;
        }

        .btn-next {
            background: #4caf50;
            border: none;
            padding: 16px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 #2e6b2f;
            transition: 0.05s linear;
            opacity: 0.6;
            pointer-events: none;
        }

        .btn-next.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-next:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #2e6b2f;
        }

        .btn-reset-soal {
            background: #ffa559;
            margin-top: 10px;
            width: auto;
            display: inline-block;
            padding: 8px 20px;
            font-size: 0.9rem;
            border-radius: 40px;
            border: none;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding-bottom: 15px;
            color: #b97f48;
        }

        .confetti-badge {
            background: gold;
            color: #c13b00;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        @media (max-width: 550px) {
            .question-text { font-size: 1.4rem; }
            .option-btn { font-size: 1.2rem; padding: 12px; }
            .option-prefix { width: 40px; height: 40px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quizContainer">
    <div class="quiz-header">
        <div class="badge-soal">
            📖 Soal 30 / 30 
            <span class="confetti-badge">🎉 TERAKHIR! 🎉</span>
        </div>
        <div class="score-badge">⭐ Skor: <span id="currentScoreDisplay">0</span></div>
    </div>

    <div class="question-area">
        <div class="question-text" id="questionText">
            🍎🍎🍎🍎🍎🍎🍎🍎🍎🍎 - 🍎🍎🍎🍎🍎 <br> 10 apel dimakan 5 apel. Sisa apel berapa?
        </div>
    </div>

    <div class="options-area" id="optionsArea"></div>

    <div class="feedback-area" id="feedbackArea">
        💡 Klik jawaban dulu ya, Kak! Ini soal terakhir, semangat! 🎈
    </div>

    <div class="next-area">
        <button class="btn-next" id="nextBtn">🏆 LIHAT RAPORT 🏆</button>
    </div>
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-reset-soal" id="resetFromSoalBtn">🔄 Reset Skor & Mulai Lagi</button>
    </div>
    <footer>
        🎵 Klik jawaban, dengar suara lucu! Kalau benar dapat poin.
    </footer>
</div>

<script>
    // ======================= DATA SOAL 30 (Pengurangan 10 - 5 = 5) =======================
    const bankSoal30 = [
        {
            pertanyaan: "🍎🍎🍎🍎🍎🍎🍎🍎🍎🍎 - 🍎🍎🍎🍎🍎 <br> 10 apel dimakan 5 apel. Sisa apel berapa?",
            options: ["4", "5", "6"],
            jawabanBenar: "5",
            petunjukSalah: "10 apel dikurangi 5 apel = 5 apel. Coba hitung: 10 kurang 5 sama dengan 5!"
        },
        {
            pertanyaan: "🐶🐶🐶🐶🐶🐶🐶🐶🐶🐶 - 🐶🐶🐶🐶🐶 <br> Ada 10 anjing, 5 anjing pulang. Sisa anjing?",
            options: ["4", "5", "6"],
            jawabanBenar: "5",
            petunjukSalah: "10 - 5 = 5. Anjing yang tersisa 5 ekor!"
        },
        {
            pertanyaan: "🎈🎈🎈🎈🎈🎈🎈🎈🎈🎈 - 🎈🎈🎈🎈🎈 <br> Dani punya 10 balon, 5 balon meledak. Sisa balon Dani?",
            options: ["4", "5", "6"],
            jawabanBenar: "5",
            petunjukSalah: "10 balon - 5 balon = 5 balon. Dani masih punya 5 balon!"
        },
        {
            pertanyaan: "⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️ - ⭐️⭐️⭐️⭐️⭐️ <br> Ada 10 bintang, 5 bintang padam. Berapa bintang yang masih terang?",
            options: ["4", "5", "6"],
            jawabanBenar: "5",
            petunjukSalah: "10 - 5 = 5. Masih ada 5 bintang terang!"
        },
        {
            pertanyaan: "🍪🍪🍪🍪🍪🍪🍪🍪🍪🍪 - 🍪🍪🍪🍪🍪 <br> 10 kue dimakan 5 kue. Sisa kue berapa?",
            options: ["4", "5", "6"],
            jawabanBenar: "5",
            petunjukSalah: "10 kue - 5 kue = 5 kue. Sisa kue tinggal 5!"
        },
        {
            pertanyaan: "🐟🐟🐟🐟🐟🐟🐟🐟🐟🐟 - 🐟🐟🐟🐟🐟 <br> Ada 10 ikan, 5 ikan berenang pergi. Sisa ikan?",
            options: ["4", "5", "6"],
            jawabanBenar: "5",
            petunjukSalah: "10 - 5 = 5. Ikan yang tersisa 5 ekor!"
        }
    ];

    let currentVariant = null;
    let soalTerjawab = false;
    let jawabanBenar = false;
    
    const STORAGE_SCORE_KEY = "tkMathGlobalScore";
    const STORAGE_COMPLETED_KEY = "tkMathCompletedFlags";

    // Fungsi suara (Web Audio API)
    function playSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = "sine";
            let frequency = type === "correct" ? 880 : 440;
            let duration = type === "correct" ? 0.4 : 0.6;
            oscillator.frequency.value = frequency;
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } catch(e) {
            console.log("Web Audio API error", e);
        }
    }

    // Fungsi untuk memainkan suara spesial "selesai"
    function playCompletionSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = "sine";
            // Nada bahagia: do-re-mi
            oscillator.frequency.value = 523.25; // C5
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            oscillator.stop(audioCtx.currentTime + 0.3);
            
            // Nada kedua
            setTimeout(() => {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = "sine";
                osc2.frequency.value = 659.25; // E5
                gain2.gain.value = 0.3;
                osc2.start();
                gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc2.stop(audioCtx.currentTime + 0.3);
            }, 150);
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        } catch(e) {
            console.log("Web Audio API error", e);
        }
    }

    function getGlobalScore() {
        let score = localStorage.getItem(STORAGE_SCORE_KEY);
        if (score === null) return 0;
        return parseInt(score, 10);
    }

    function setGlobalScore(score) {
        localStorage.setItem(STORAGE_SCORE_KEY, score);
        updateScoreUI();
    }

    function addScore(points) {
        let current = getGlobalScore();
        let newScore = current + points;
        setGlobalScore(newScore);
        return newScore;
    }

    function updateScoreUI() {
        const scoreSpan = document.getElementById("currentScoreDisplay");
        if (scoreSpan) {
            scoreSpan.innerText = getGlobalScore();
        }
    }

    function isSoalCompleted(soalNumber) {
        let completed = localStorage.getItem(STORAGE_COMPLETED_KEY);
        if (!completed) return false;
        let arr = JSON.parse(completed);
        return arr.includes(soalNumber);
    }

    function setSoalCompleted(soalNumber) {
        let completed = localStorage.getItem(STORAGE_COMPLETED_KEY);
        let arr = completed ? JSON.parse(completed) : [];
        if (!arr.includes(soalNumber)) {
            arr.push(soalNumber);
            localStorage.setItem(STORAGE_COMPLETED_KEY, JSON.stringify(arr));
        }
    }

    function initRandomVariant() {
        const randomIndex = Math.floor(Math.random() * bankSoal30.length);
        currentVariant = { ...bankSoal30[randomIndex] };
    }

    function renderSoal() {
        if (!currentVariant) {
            initRandomVariant();
        }
        const qText = document.getElementById("questionText");
        qText.innerHTML = currentVariant.pertanyaan;
        
        const optionsContainer = document.getElementById("optionsArea");
        optionsContainer.innerHTML = "";
        const prefixes = ["A", "B", "C"];
        currentVariant.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.setAttribute("data-value", opt);
            btn.innerHTML = `<span class="option-prefix">${prefixes[idx]}</span> ${opt}`;
            btn.addEventListener("click", () => handleAnswer(opt, btn));
            optionsContainer.appendChild(btn);
        });
        
        soalTerjawab = false;
        jawabanBenar = false;
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.classList.remove("active");
        const feedbackDiv = document.getElementById("feedbackArea");
        feedbackDiv.innerHTML = "🎈 10 - 5 = ? Ini soal terakhir! Kerjakan dengan semangat! 🎈";
        
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.style.background = "white";
            btn.style.border = "3px solid #ffb347";
            btn.style.pointerEvents = "auto";
        });
    }
    
    function handleAnswer(selectedVal, btnElement) {
        if (soalTerjawab) {
            const feedbackDiv = document.getElementById("feedbackArea");
            feedbackDiv.innerHTML = "⚠️ Kamu sudah menjawab! Klik 'Lihat Raport' untuk lihat hasil akhir ya! ⚠️";
            return;
        }
        
        const isCorrect = (selectedVal === currentVariant.jawabanBenar);
        const feedbackDiv = document.getElementById("feedbackArea");
        
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.style.pointerEvents = "none";
        });
        
        if (isCorrect) {
            playSound("correct");
            jawabanBenar = true;
            
            if (!isSoalCompleted(30)) {
                addScore(1);
                setSoalCompleted(30);
                feedbackDiv.innerHTML = `✅✅✅ BENAR SEKALI! ✅✅✅ <br> ${currentVariant.jawabanBenar} itu jawabannya. +1 poin! <br> 🎉 SELAMAT! Kamu telah menyelesaikan semua 30 soal! 🎉`;
                // Mainkan nada kemenangan
                playCompletionSound();
            } else {
                feedbackDiv.innerHTML = `🎉 Jawabanmu BENAR! Kamu sudah menyelesaikan soal ini sebelumnya. Klik 'Lihat Raport' untuk lihat hasil! 🎉`;
            }
            btnElement.style.background = "#b9f6ca";
            btnElement.style.border = "3px solid #2e7d32";
        } else {
            playSound("wrong");
            jawabanBenar = false;
            feedbackDiv.innerHTML = `❌ Aduh, kurang tepat! ❌ <br> 💡 ${currentVariant.petunjukSalah} 💡 <br> Jangan menyerah! Kamu tetap hebat sudah sampai soal terakhir!`;
            btnElement.style.background = "#ffcdd2";
            btnElement.style.border = "3px solid #c62828";
        }
        
        soalTerjawab = true;
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.classList.add("active");
        updateScoreUI();
    }
    
    function goToRaport() {
        if (!soalTerjawab) {
            alert("Kak, pilih jawaban dulu yuk untuk soal terakhir ini!");
            return;
        }
        // Arahkan ke halaman raport
        window.location.href = "raport.html";
    }
    
    function resetGlobalAndRestart() {
        if (confirm("Yakin mau reset semua skor dan mulai dari awal? Semua jawaban benar sebelumnya akan hilang.")) {
            localStorage.setItem(STORAGE_SCORE_KEY, "0");
            localStorage.removeItem(STORAGE_COMPLETED_KEY);
            window.location.href = "index.html";
        }
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        initRandomVariant();
        renderSoal();
        updateScoreUI();
        
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.addEventListener("click", goToRaport);
        
        const resetBtn = document.getElementById("resetFromSoalBtn");
        if (resetBtn) {
            resetBtn.addEventListener("click", resetGlobalAndRestart);
        }
        
        if (isSoalCompleted(30)) {
            const feedbackDiv = document.getElementById("feedbackArea");
            feedbackDiv.innerHTML = "📢 Hebat! Kamu sudah menyelesaikan soal 30! Klik 'Lihat Raport' untuk melihat hasil akhir dan evaluasimu! 📢";
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.classList.add("active");
            // Tandai soal sudah terjawab meskipun belum klik jawaban (karena sudah pernah)
            soalTerjawab = true;
        }
        
        const enableAudio = () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
            }
            document.removeEventListener('click', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        };
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);
    });
</script>
</body>
</html>
